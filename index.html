  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080A0C; --bg2: #0D1014; --bg3: #141820;
      --text: #EDEAE3; --muted: #55554F; --muted2: #8A8A83;
      --border: #1A1D22; --border2: #2A2D33;
      --accent: oklch(0.75 0.20 175); --c: var(--accent);
      --serif: 'Instrument Serif', 'Times New Roman', serif;
      --mono: 'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 1000;
      pointer-events: none; opacity: 0;
    }
    .mono { font-family: var(--mono); }
    .muted { color: var(--muted); }
    a { color: inherit; text-decoration: none; }
    button { background: none; border: none; cursor: pointer; color: inherit; font-family: inherit; font-size: inherit; }
    em { font-family: var(--serif); font-style: italic; font-weight: 400; }
    .route-wrap { animation: fade-in 0.5s ease both; }
    @keyframes fade-in { from { opacity: 0.01; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) {
      .route-wrap, .home-eyebrow, .home-name-big, .home-role-line, .home-desc-line, .home-cta-row, .home-right, .work-tile-2x2 {
        animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important;
      }
    }
    .section-label { font-size: 11px; letter-spacing: 0.16em; display: block; margin-bottom: 20px; text-transform: uppercase; }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      transition: background 0.3s, border-color 0.3s, backdrop-filter 0.3s;
      border-bottom: 1px solid transparent;
    }
    .nav-scrolled { background: rgba(8,10,12,0.8); backdrop-filter: blur(14px); border-color: var(--border); }
    .nav-name { font-size: 14px; font-weight: 700; letter-spacing: 0.18em; }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-link {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
      color: var(--muted); transition: color 0.2s; position: relative; padding: 4px 0;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link-active { color: var(--text); }
    .nav-link-active::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: -2px;
      height: 1px; background: var(--accent);
    }

    /* ═════════ HOME PAGE V2 ═════════ */
    .page-home {
      min-height: 100vh; display: flex; align-items: center;
      padding: 100px 48px 60px; position: relative; overflow: hidden;
    }
    .home-grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 100%);
    }
    .home-hero-v2 {
      position: relative; z-index: 1; max-width: 1400px; margin: 0 auto;
      width: 100%; display: grid; grid-template-columns: 1fr 380px;
      gap: 80px; align-items: center;
    }
    .home-left { max-width: 760px; }
    .home-eyebrow {
      font-size: 11px; letter-spacing: 0.16em; color: var(--muted2);
      margin-bottom: 40px; text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 7px 14px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--bg2);
      animation: rise 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .dot-live-green { width: 7px; height: 7px; border-radius: 50%; background: #6EE7B7; box-shadow: 0 0 8px #6EE7B7; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .home-name-big {
      font-size: clamp(80px, 13vw, 200px);
      font-weight: 700; line-height: 0.86;
      letter-spacing: -0.04em;
      display: flex; flex-direction: column; gap: 0;
      animation: rise 1s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    .name-first {
      background: linear-gradient(180deg, #EDEAE3 40%, rgba(237,234,227,0.55) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .name-last {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-top: -0.12em;
    }
    .home-role-line {
      margin-top: 36px; font-size: clamp(17px, 1.6vw, 22px);
      color: var(--muted2); display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap;
      animation: rise 0.8s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .cycler {
      position: relative; display: inline-block;
      min-width: 140px; height: 1.3em;
    }
    .cycler-word {
      position: absolute; top: 0; left: 0;
      color: var(--text); font-weight: 500;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.5s, transform 0.5s;
    }
    .cycler-active { opacity: 1; transform: none; }
    .role-sep { opacity: 0.3; }
    .home-desc-line {
      margin-top: 28px; font-size: 17px; line-height: 1.7;
      color: var(--muted2); max-width: 580px;
      animation: rise 0.8s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .home-cta-row {
      display: flex; gap: 14px; margin-top: 44px;
      animation: rise 0.8s 0.65s cubic-bezier(0.16,1,0.3,1) both;
    }
    .home-cta {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 24px; border-radius: 6px;
      font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
      border: 1px solid var(--border2); color: var(--muted2);
      transition: all 0.2s;
    }
    .home-cta:hover { border-color: var(--text); color: var(--text); }
    .home-cta-primary { border-color: var(--accent); color: var(--accent); }
    .home-cta-primary:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .home-right {
      display: flex; flex-direction: column; gap: 24px;
      animation: rise 1s 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    .portrait-slot {
      aspect-ratio: 4/5; background: var(--bg2); border: 1px solid var(--border);
      position: relative; overflow: hidden; border-radius: 2px;
    }
    .portrait-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .home-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
      border-top: 1px solid var(--border); padding-top: 20px;
    }
    .home-stat { display: flex; flex-direction: column; gap: 4px; }
    .home-stat span:first-child { font-size: 10px; letter-spacing: 0.12em; }
    .home-stat span:last-child { font-size: 13px; font-weight: 500; }

    /* ═════════ WORK PAGE (2x2) ═════════ */
    .page-work { padding: 140px 48px 80px; max-width: 1400px; margin: 0 auto; }
    .work-header { margin-bottom: 80px; max-width: 900px; }
    .work-title {
      font-size: clamp(48px, 7vw, 104px); font-weight: 700;
      line-height: 1; letter-spacing: -0.03em; margin-bottom: 28px;
    }
    .work-blurb { font-size: 18px; color: var(--muted2); max-width: 540px; line-height: 1.6; }

    .work-grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .work-tile-2x2 {
      cursor: pointer; display: flex; flex-direction: column;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden;
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), border-color 0.3s;
      animation: tile-rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: calc(var(--i) * 0.08s);
    }
    @keyframes tile-rise { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: none; } }
    .work-tile-2x2:hover { transform: translateY(-6px); border-color: var(--c); }
    .tile-visual-wrap {
      height: 340px; position: relative; overflow: hidden; background: var(--bg3);
    }
    .tile-caption {
      padding: 28px 32px 32px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .tile-meta { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; display: flex; gap: 8px; align-items: center; }
    .tile-dot { opacity: 0.4; }
    .tile-title { font-size: 24px; font-weight: 600; line-height: 1.15; letter-spacing: -0.01em; }
    .tile-short { font-size: 14px; color: var(--muted2); line-height: 1.55; margin-bottom: 14px; }
    .tile-footer {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-top: 1px solid var(--border); padding-top: 16px; margin-top: auto;
    }
    .tile-stat-v { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; display: block; line-height: 1; }
    .tile-stat-l { font-size: 10px; letter-spacing: 0.1em; margin-top: 4px; display: block; }
    .tile-view { font-size: 11px; letter-spacing: 0.12em; font-weight: 600; padding-bottom: 4px; transition: transform 0.2s; }
    .work-tile-2x2:hover .tile-view { transform: translateX(4px); }

    /* Featured (wide) tile — keeps an odd count balanced */
    .work-tile-2x2.featured { grid-column: 1 / -1; flex-direction: row; min-height: 440px; }
    .work-tile-2x2.featured .tile-visual-wrap { width: 56%; height: auto; }
    .work-tile-2x2.featured .tile-caption { width: 44%; justify-content: center; gap: 14px; padding: 40px 46px; }
    .work-tile-2x2.featured .tile-title { font-size: 32px; }
    .work-tile-2x2.featured .tile-short { font-size: 15px; max-width: 440px; margin-bottom: 18px; }

    /* Visit-live CTA on detail pages */
    .detail-live { margin-top: 26px; }
    .detail-live-btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 12px 22px; border-radius: 6px;
      font-size: 13px; font-weight: 500; letter-spacing: 0.03em;
      border: 1px solid var(--c); color: var(--c); transition: all 0.2s;
    }
    .detail-live-btn:hover { background: var(--c); color: var(--bg); }

    /* ═════════ SCREENSHOT SLOT VISUAL ═════════ */
    .vis { width: 100%; height: 100%; position: relative; display: flex; }
    .vis-slot {
      width: 100%; height: 100%; position: relative; overflow: hidden;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.01) 100%);
      display: flex; flex-direction: column;
    }
    .slot-stripes {
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(-45deg, transparent 0 16px, rgba(255,255,255,0.025) 16px 17px);
    }
    .slot-frame {
      position: absolute; inset: 20px; border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 2px;
    }
    .slot-inner {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; padding: 20px;
      text-align: center;
    }
    .slot-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 0.14em; padding: 5px 11px;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 100px;
      color: var(--muted2);
    }
    .slot-dot { width: 6px; height: 6px; border-radius: 50%; animation: pulse 2s infinite; }
    .slot-label {
      font-size: 18px; font-weight: 600; letter-spacing: 0.06em;
      color: var(--text); text-transform: uppercase;
    }
    .slot-hint { font-size: 11px; letter-spacing: 0.06em; max-width: 280px; line-height: 1.5; }
    .slot-meta {
      position: absolute; bottom: 16px; left: 20px; right: 20px;
      display: flex; justify-content: space-between;
      font-size: 10px; letter-spacing: 0.1em;
      z-index: 2;
    }

    /* ═════════ SYSTEM 1 VISUAL ═════════ */
    .vis-s1 {
      background: linear-gradient(180deg, #131417 0%, #0A0B0D 100%);
      align-items: center; justify-content: center; padding: 20px;
    }
    .s1-stage { position: relative; display: flex; align-items: center; justify-content: center; }
    .phone-frame {
      width: 200px; height: 400px;
      background: #0A0806; border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
      position: relative; padding: 12px;
      box-shadow: 0 40px 80px rgba(255,255,255,0.05), inset 0 0 0 1px rgba(255,255,255,0.02);
    }
    .phone-notch {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 70px; height: 16px; background: #000; border-radius: 100px;
    }
    .phone-screen {
      width: 100%; height: 100%; border-radius: 18px;
      background: linear-gradient(180deg, #0A0806 0%, #100D06 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; padding: 28px 18px 22px; gap: 14px; overflow: hidden;
    }
    .s1-state { font-size: 9px; color: var(--c); letter-spacing: 0.16em; text-transform: uppercase; }
    .s1-orb-wrap { position: relative; width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; }
    .s1-orb-ring {
      position: absolute; border: 1px solid var(--c); border-radius: 50%;
      opacity: 0; animation: orb-ring 3s ease-out infinite;
    }
    .s1-orb-ring.r1 { width: 60px; height: 60px; animation-delay: 0s; }
    .s1-orb-ring.r2 { width: 100px; height: 100px; animation-delay: 1s; }
    .s1-orb-ring.r3 { width: 130px; height: 130px; animation-delay: 2s; }
    @keyframes orb-ring { 0%{opacity:0.8;transform:scale(0.3)} 100%{opacity:0;transform:scale(1.2)} }
    .s1-orb-core {
      width: 50px; height: 50px; border-radius: 50%;
      background: radial-gradient(circle, var(--c) 0%, rgba(216,222,230,0.28) 60%, transparent 100%);
      animation: orb-breath 2s ease-in-out infinite alternate;
    }
    @keyframes orb-breath {
      from { transform: scale(0.9); box-shadow: 0 0 20px var(--c); }
      to { transform: scale(1.1); box-shadow: 0 0 50px var(--c); }
    }
    .s1-wave { display: flex; gap: 2px; align-items: center; height: 28px; }
    .s1-wave span {
      width: 2px; background: var(--c); border-radius: 1px;
      animation: wave 0.8s ease-in-out infinite alternate;
    }
    @keyframes wave { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
    .s1-transcript {
      font-size: 10px; color: rgba(237,234,227,0.7); line-height: 1.4; text-align: center;
      font-family: var(--mono); max-width: 180px;
    }

    /* ═════════ AGENT VISUAL ═════════ */
    .agent-vis {
      width: 100%; height: 100%; position: relative;
      display: flex; align-items: center; justify-content: center; padding: 16px;
      background: radial-gradient(ellipse at 50% 38%, rgba(0,212,200,0.07), transparent 68%), linear-gradient(180deg, #0A0E11 0%, #06090C 100%);
    }
    .agent-ghost {
      position: absolute; width: 286px; height: 250px; border: 1px solid var(--border2);
      border-radius: 10px; background: rgba(18,22,28,0.55);
    }
    .agent-ghost.g1 { transform: translate(-28px, -20px) scale(0.95); opacity: 0.4; }
    .agent-ghost.g2 { transform: translate(26px, 18px) scale(0.92); opacity: 0.25; }
    .agent-browser {
      position: relative; width: 318px; max-width: 86%;
      background: #0E1318; border: 1px solid var(--c); border-radius: 10px; overflow: hidden;
      box-shadow: 0 20px 54px rgba(0,0,0,0.55), 0 0 24px rgba(0,212,200,0.08);
    }
    .agent-chrome {
      display: flex; align-items: center; gap: 9px; padding: 8px 11px;
      border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02);
    }
    .agent-dots { display: flex; gap: 5px; flex: none; }
    .agent-dots i { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.16); display: block; }
    .agent-url {
      flex: 1; font-family: var(--mono); font-size: 9.5px; color: var(--muted2);
      background: rgba(0,0,0,0.35); border-radius: 5px; padding: 4px 9px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .agent-form { padding: 13px 15px 11px; display: flex; flex-direction: column; gap: 9px; }
    .agent-field { display: flex; flex-direction: column; gap: 3px; }
    .af-label { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .af-input {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      min-height: 27px; padding: 5px 9px; border-radius: 6px;
      border: 1px solid var(--border2); background: rgba(255,255,255,0.02);
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .agent-field.active .af-input { border-color: var(--c); box-shadow: 0 0 0 3px rgba(0,212,200,0.13); background: rgba(0,212,200,0.04); }
    .agent-field.done .af-input { border-color: rgba(0,212,200,0.42); }
    .af-text { font-size: 11.5px; color: var(--text); font-family: var(--mono); white-space: nowrap; overflow: hidden; }
    .af-caret { display: inline-block; width: 1.5px; height: 12px; background: var(--c); margin-left: 1px; vertical-align: middle; animation: af-blink 1s steps(1) infinite; }
    @keyframes af-blink { 50% { opacity: 0; } }
    .af-check { color: var(--c); font-size: 12px; font-weight: 700; flex: none; animation: af-pop 0.32s cubic-bezier(0.2,1.4,0.4,1); }
    @keyframes af-pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .agent-submit {
      margin-top: 2px; text-align: center; font-size: 11.5px; font-weight: 600; letter-spacing: 0.02em;
      padding: 8px; border-radius: 6px; color: var(--muted2);
      border: 1px solid var(--border2); transition: all 0.3s;
    }
    .agent-submit.go { background: var(--c); color: #04110F; border-color: var(--c); box-shadow: 0 0 18px rgba(0,212,200,0.4); }
    .agent-success {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      background: rgba(6,9,12,0.88); backdrop-filter: blur(3px);
      font-size: 13px; font-weight: 600; color: var(--text); animation: af-fade 0.4s ease;
    }
    .agent-success .as-check {
      width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      background: var(--c); color: #04110F; font-size: 23px; font-weight: 800;
      box-shadow: 0 0 28px rgba(0,212,200,0.55); animation: af-pop 0.4s cubic-bezier(0.2,1.4,0.4,1);
    }
    @keyframes af-fade { from { opacity: 0; } to { opacity: 1; } }
    .agent-status {
      display: flex; align-items: center; gap: 7px; padding: 7px 13px;
      border-top: 1px solid var(--border); font-family: var(--mono); font-size: 9px;
      letter-spacing: 0.04em; color: var(--muted2); background: rgba(0,0,0,0.28);
    }
    .agent-status b { color: var(--c); font-weight: 600; }
    .agent-sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--c); box-shadow: 0 0 8px var(--c); animation: pulse 1.6s infinite; flex: none; }

    /* ═════════ SERPFLARE VISUAL ═════════ */
    .sf-vis {
      width: 100%; height: 100%; position: relative;
      display: flex; align-items: center; justify-content: center; padding: 16px;

      FIELDS.forEach((f, i) => {
        T(() => { setActive(i); setTyped(''); }, d);
        d += 360;
        for (let c = 1; c <= f.value.length; c++) {
          const cc = c;
          T(() => setTyped(f.value.slice(0, cc)), d);
          d += 34 + Math.random() * 34;
        }
        d += 260;
        T(() => setDoneCount(i + 1), d);
        d += 360;
      });
      T(() => { setActive(-1); setSubmitted(true); }, d);
      d += 2000;
      T(run, d);
    }
    run();
    return () => { alive = false; timers.current.forEach(clearTimeout); timers.current = []; };
  }, []);

  return (
    <div className="agent-vis" style={{ '--c': accent }}>
      <div className="agent-ghost g1"/>
      <div className="agent-ghost g2"/>
      <div className="agent-browser">
        <div className="agent-chrome">
          <span className="agent-dots"><i/><i/><i/></span>
          <span className="agent-url">careers.acme.io/apply</span>
        </div>
        <div className="agent-form">
          {FIELDS.map((f, i) => {
            const isActive = i === active;
            const isDone = i < doneCount;
            const text = isDone ? f.value : (isActive ? typed : '');
            return (
              <div key={i} className={`agent-field ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`}>
                <span className="af-label">{f.label}</span>
                <div className="af-input">
                  <span className="af-text">{text}{isActive && !isDone && <span className="af-caret"/>}</span>
                  {isDone && <span className="af-check">✓</span>}
                </div>
              </div>
            );
          })}
          <div className={`agent-submit ${submitted ? 'go' : ''}`}>Submit application →</div>
        </div>
        {submitted && (
          <div className="agent-success">
            <span className="as-check">✓</span>
            Application submitted
          </div>
        )}
        <div className="agent-status">
          <span className="agent-sdot"/> agent · <b>{doneCount}</b>/{FIELDS.length} fields · 3-source verified
        </div>
      </div>
    </div>
  );
}
function NavCoreVisual({ accent }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = 800, H = 520;
    canvas.width = W; canvas.height = H;

    const hexToRgb = (hex) => {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return {r,g,b};
    };
    const ac = hexToRgb(accent);
    const acRgba = (a) => `rgba(${ac.r},${ac.g},${ac.b},${a})`;

    const COMPANIES = [
      'Deloitte','KPMG','Rolls-Royce','Unilever','Barclays','BP','GSK',
      'AstraZeneca','HSBC','Dyson','ARM','BT Group','Tesco','Sage',
      'Lloyds','Vodafone','Shell','BAE Systems','Monzo','Revolut',
      'Spotify','Deliveroo','Darktrace','Ocado','McLaren','Sky',
      'NatWest','Aviva','Legal & General','Arup','WPP','Experian',
      'Accenture','Capgemini','ThoughtWorks','Palantir','Wise','Checkout.com',
    ];

    // Companies spread across full top width
    const companies = COMPANIES.map((name, i) => {
      const ratio = i / (COMPANIES.length - 1);
      const x = 40 + ratio * (W - 80);
      const y = 50 + Math.random() * 60;
      return { name, x, y, alpha: 0.5 + Math.random() * 0.4 };
    });

    // Engine center
    const engine = { x: W / 2, y: H * 0.44 };
    // Database bottom
    const db = { x: W / 2, y: H * 0.82 };

    // Particles flowing from companies → engine
    const particles = [];
    // Data drops flowing engine → database
    const dataDrops = [];
    let t = 0;
    let processedCount = 0;

    function spawnParticle() {
      const ci = Math.floor(Math.random() * companies.length);
      const c = companies[ci];
      particles.push({
        x: c.x, y: c.y,
        targetX: engine.x + (Math.random() - 0.5) * 16,
        targetY: engine.y + (Math.random() - 0.5) * 8,
        progress: 0,
        speed: 0.008 + Math.random() * 0.006,
        companyIdx: ci,
        showName: Math.random() < 0.3,
      });
    }

    function spawnDataDrop() {
      dataDrops.push({
        x: engine.x + (Math.random() - 0.5) * 20,
        y: engine.y + 20,
        targetX: db.x + (Math.random() - 0.5) * 40,
        targetY: db.y - 10,
        progress: 0,
        speed: 0.01 + Math.random() * 0.008,
      });
    }

    // Draw a small building icon
    function drawBuilding(x, y, size, alpha) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = acRgba(0.6);
      // Main body
      ctx.fillRect(x - size * 0.4, y - size, size * 0.8, size);
      // Windows
      ctx.fillStyle = acRgba(0.9);
      const ws = size * 0.15;
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 2; col++) {
          ctx.fillRect(
            x - size * 0.25 + col * size * 0.35,
            y - size * 0.85 + row * size * 0.3,
            ws, ws
          );
        }
      }
      ctx.globalAlpha = 1;
    }

    // Draw database cylinder
    function drawDatabase(x, y, w, h) {
      const ry = 8;
      ctx.strokeStyle = acRgba(0.6);
      ctx.lineWidth = 1.5;
      ctx.fillStyle = acRgba(0.08);
      // Body
      ctx.beginPath();
      ctx.moveTo(x - w/2, y - h/2 + ry);
      ctx.lineTo(x - w/2, y + h/2 - ry);
      ctx.ellipse(x, y + h/2 - ry, w/2, ry, 0, Math.PI, 0, true);
      ctx.lineTo(x + w/2, y - h/2 + ry);
      ctx.fill();
      ctx.stroke();
      // Top ellipse
      ctx.beginPath();
      ctx.ellipse(x, y - h/2 + ry, w/2, ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = acRgba(0.15);
      ctx.fill();
      ctx.stroke();
      // Middle line
      ctx.beginPath();
      ctx.ellipse(x, y - 2, w/2, ry, 0, 0, Math.PI, false);
      ctx.strokeStyle = acRgba(0.2);
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t++;

      // --- Background: curved flowing lines from companies to engine ---
      companies.forEach(c => {
        const cpx = (c.x + engine.x) / 2;
        const cpy = c.y + (engine.y - c.y) * 0.8;
        ctx.strokeStyle = acRgba(0.15);
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(c.x, c.y);
        ctx.quadraticCurveTo(cpx, cpy, engine.x, engine.y - 8);
        ctx.stroke();
      });

      // Faint line engine → db
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(engine.x - 15, engine.y + 20);
      ctx.lineTo(db.x - 15, db.y - 20);
      ctx.moveTo(engine.x + 15, engine.y + 20);
      ctx.lineTo(db.x + 15, db.y - 20);
      ctx.stroke();

      // --- Draw company buildings along top ---
      companies.forEach((c, i) => {
        drawBuilding(c.x, c.y, 10, c.alpha * 0.5);
      });

      // "120,000+" label at top center
      ctx.font = '700 14px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = acRgba(0.9);
      ctx.fillText('120,000+', W / 2, 22);
      ctx.font = '400 9px "JetBrains Mono", monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('UK COMPANIES WITH SPONSOR LICENCES', W / 2, 36);

      // --- Spawn particles ---
      if (t % 3 === 0) spawnParticle();
      if (t % 25 === 0) spawnDataDrop();

      // --- Draw & update particles (company → engine, along curve) ---
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.progress += p.speed;
        const c = companies[p.companyIdx];
        const t2 = p.progress;
        const cpx = (c.x + engine.x) / 2;
        const cpy = c.y + (engine.y - c.y) * 0.8;
        const ex = engine.x, ey = engine.y - 8;
        const bx = (1-t2)*(1-t2)*c.x + 2*(1-t2)*t2*cpx + t2*t2*ex;
        const by = (1-t2)*(1-t2)*c.y + 2*(1-t2)*t2*cpy + t2*t2*ey;

        ctx.fillStyle = acRgba(0.9 * (1 - t2 * 0.3));
        ctx.beginPath(); ctx.arc(bx, by, 2, 0, Math.PI * 2); ctx.fill();

        if (p.showName && t2 < 0.4) {
          ctx.font = '400 8px "JetBrains Mono", monospace';
          ctx.fillStyle = `rgba(237,234,227,${0.6 * (1 - t2 * 2.5)})`;
          ctx.textAlign = 'center';
          ctx.fillText(c.name, bx, by - 8);
        }

        if (p.progress >= 1) { processedCount++; particles.splice(i, 1); }
      }

      // --- Draw data drops (engine → database) ---
      for (let i = dataDrops.length - 1; i >= 0; i--) {
        const d = dataDrops[i];
        d.progress += d.speed;
        const dy = d.y + (d.targetY - d.y) * d.progress;
        const dx = d.x + (d.targetX - d.x) * d.progress;
        const alpha = 0.7 * (1 - d.progress * 0.6);
        ctx.fillStyle = acRgba(alpha);
        ctx.beginPath(); ctx.arc(dx, dy, 1.5, 0, Math.PI * 2); ctx.fill();
        if (d.progress >= 1) dataDrops.splice(i, 1);
      }

      // --- Engine node ---
      // Glow
      const grd = ctx.createRadialGradient(engine.x, engine.y, 0, engine.x, engine.y, 40);
      grd.addColorStop(0, acRgba(0.15));
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(engine.x, engine.y, 40, 0, Math.PI * 2); ctx.fill();

      // Pulse rings
      for (let p = 0; p < 2; p++) {
        const phase = ((t * 0.6 + p * 120) % 240) / 240;
        const radius = 16 + phase * 30;
        ctx.strokeStyle = acRgba((1 - phase) * 0.3);
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(engine.x, engine.y, radius, 0, Math.PI * 2); ctx.stroke();
      }

      // Engine box
      const ew = 120, eh = 32;
      ctx.fillStyle = acRgba(0.12);
      ctx.strokeStyle = acRgba(0.5);
      ctx.lineWidth = 1.5;
      const br = 6;
      ctx.beginPath();
      ctx.roundRect(engine.x - ew/2, engine.y - eh/2, ew, eh, br);
      ctx.fill(); ctx.stroke();

      ctx.font = '600 11px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = acRgba(1);
      ctx.fillText('NAVCORE', engine.x, engine.y + 4);

      // --- Side labels ---
      ctx.font = '400 8px "JetBrains Mono", monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.textAlign = 'right';
      ctx.fillText('NAVIGATES SITES', engine.x - 80, engine.y - 6);
      ctx.fillText('EXTRACTS DATA', engine.x - 80, engine.y + 8);
      ctx.textAlign = 'left';
      ctx.fillText('VERIFIES DAILY', engine.x + 80, engine.y - 6);
      ctx.fillText('REMOVES EXPIRED', engine.x + 80, engine.y + 8);

      // Side connector lines
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(engine.x - ew/2, engine.y);
      ctx.lineTo(engine.x - 76, engine.y);
      ctx.moveTo(engine.x + ew/2, engine.y);
      ctx.lineTo(engine.x + 76, engine.y);
      ctx.stroke();

      // --- Database ---
      drawDatabase(db.x, db.y, 60, 40);
      ctx.font = '500 9px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillText('JOB DATABASE', db.x, db.y + 34);

      // --- Bottom stats ---
      ctx.font = '400 9px "JetBrains Mono", monospace';
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      const dots = '.'.repeat((Math.floor(t / 30) % 3) + 1);
      ctx.fillText('CRAWLING' + dots, 16, H - 14);

      ctx.textAlign = 'right';
      ctx.fillStyle = acRgba(0.7);
      ctx.fillText((processedCount % 999).toLocaleString() + ' PROCESSED', W - 16, H - 14);

      animRef.current = requestAnimationFrame(draw);
    }

    animRef.current = requestAnimationFrame(draw);
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [accent]);

  return (
    <div className="vis" style={{ '--c': accent, background: 'linear-gradient(180deg, #0D0A18 0%, #08060F 100%)' }}>
      <canvas ref={canvasRef} style={{ width: '100%', height: '100%', display: 'block' }} />
    </div>
  );
}

function SerpFlareVisual({ accent }) {
  const TIERS = ['http', 'browser', 'managed'];
  const DEMOS = [
    { method: 'POST', endpoint: '/search', url: 'best js frameworks 2024', tier: 0, ms: 410, credits: 1, lines: [
      '{ "searchParameters": {',
      '    "q": "best js frameworks",',
      '    "engine": "google" },',
      '  "organic": [ { "position": 1,',
      '    "title": "Top 10 JS…" } ] }',
    ]},
    { method: 'POST', endpoint: '/scrape', url: 'https://linear.app', tier: 1, ms: 1911, credits: 1, lines: [
      '{ "url": "linear.app",',
      '  "tier": "browser",',
      '  "markdown": "# The product',
      '    development system…",',
      '  "status": 200 }',
    ]},
    { method: 'POST', endpoint: '/map', url: 'https://stripe.com', tier: 0, ms: 680, credits: 1, lines: [
      '{ "url": "stripe.com",',
      '  "tier": "http",',
      '  "links": 318,',
      '  "credits": 1 }',
    ]},
  ];
  const [di, setDi] = useState(0);
  const [phase, setPhase] = useState('request');
  const [tierStep, setTierStep] = useState(-1);
  const [lineCount, setLineCount] = useState(0);
  const timers = useRef([]);

  useEffect(() => {
    let alive = true;
    const T = (fn, ms) => { const id = setTimeout(() => { if (alive) fn(); }, ms); timers.current.push(id); };
    function run(idx) {
      const d = DEMOS[idx];
      setDi(idx); setPhase('request'); setTierStep(-1); setLineCount(0);
      let t = 600;
      T(() => setPhase('tiers'), t);
      for (let i = 0; i <= d.tier; i++) { const ii = i; T(() => setTierStep(ii), t); t += 340; }
      t += 360;
      T(() => setPhase('response'), t);
      for (let l = 1; l <= d.lines.length; l++) { const ll = l; T(() => setLineCount(ll), t); t += 330; }
      t += 280;
      T(() => setPhase('done'), t);
      t += 1700;
      T(() => run((idx + 1) % DEMOS.length), t);
    }
    run(0);
    return () => { alive = false; timers.current.forEach(clearTimeout); timers.current = []; };
  }, []);

  const d = DEMOS[di];
  const revealedMax = phase === 'request' ? -1 : (phase === 'tiers' ? tierStep : d.tier);
  return (
    <div className="sf-vis" style={{ '--c': accent }}>
      <div className="sf-console">
        <div className="sf-bar">
          <span className="sf-method">{d.method}</span>
          <span className="sf-endpoint">{d.endpoint}</span>
          <span className="sf-url">{d.url}</span>
        </div>
        <div className="sf-tiers">
          <span className="sf-tier-label">tier</span>
          {TIERS.map((t, i) => {
            let cls;
            if (phase === 'request') cls = 'hidden';
            else if (i <= revealedMax) cls = i < d.tier ? 'tried' : 'win';
            else cls = 'idle';
            return <span key={t} className={`sf-pill ${cls}`}>{t}</span>;
          })}
        </div>
        <div className="sf-response">
          <div className={`sf-resp-head ${phase === 'done' ? 'on' : ''}`}>
            <span className="sf-ok">200 OK</span>
            <span className="sf-chip">{d.credits} credit</span>
            <span className="sf-chip ms">⚡ {d.ms}ms</span>
          </div>
          {d.lines.slice(0, lineCount).map((ln, i) => <div className="sf-line" key={di + '-' + i}>{ln}</div>)}
          {phase === 'response' && lineCount < d.lines.length && <div className="sf-line sf-cursor">▍</div>}
        </div>
      </div>
    </div>
  );
}

}

/* ════════ ROUTER ═══════════════════════════════════════════════════ */
function useHashRoute() {
  const [route, setRoute] = useState(() => window.location.hash.replace(/^#\/?/, '') || 'home');
  useEffect(() => {
    const fn = () => setRoute(window.location.hash.replace(/^#\/?/, '') || 'home');
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);
  const go = useCallback((r) => { window.location.hash = '/' + r; window.scrollTo(0,0); }, []);
  return [route, go];
}

/* ════════ CYCLING WORD ═════════════════════════════════════════════ */
const ROLES = ['Engineer','Founder','Architect','Designer'];
function CyclingWord() {
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setI(v => (v + 1) % ROLES.length), 2400);
    return () => clearInterval(t);
  }, []);
  return (
    <span className="cycler">
      {ROLES.map((w, idx) => (
        <span key={w} className={`cycler-word ${idx === i ? 'cycler-active' : ''}`}>{w}</span>
      ))}
    </span>
  );
}

/* ════════ APP ══════════════════════════════════════════════════════ */
function App() {
  const [route, go] = useHashRoute();

  let Page = null;
  if (route === 'home' || route === '') Page = <HomePage go={go} />;
  else if (route === 'work') Page = <window.WorkPage go={go} />;
  else if (route === 'about') Page = <window.AboutPage go={go} />;
  else if (route === 'contact') Page = <window.ContactPage go={go} />;
  else if (route.startsWith('project/')) Page = <window.ProjectDetail id={route.split('/')[1]} go={go} />;
  else Page = <HomePage go={go} />;

  return (
    <div className="app">
      <window.Nav route={route} go={go} />
      <div key={route} className="route-wrap">{Page}</div>
      <Footer go={go} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
